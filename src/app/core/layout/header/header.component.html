<header class="bg-sky-700 shadow-md sticky top-0 z-50">
  <div class="px-6 mx-auto w-full">
    <div class="flex items-center justify-between h-16">
      
      <!-- Left Side: Logo & Navigation -->
      <div class="flex items-center flex-1">
        <!-- Logo Area -->
        <div class="flex items-center flex-shrink-0 mr-8">
          <lucide-icon [img]="TestTubes" class="text-white mr-2" size="24"></lucide-icon>
          <span class="text-xl font-bold text-white tracking-tight hidden lg:block">LabMaster</span>
        </div>

        <!-- Navigation Menu -->
        <nav class="hidden md:flex space-x-2">
          <a *ngFor="let item of navItems" 
             [routerLink]="item.route" 
             routerLinkActive="bg-sky-800 text-white shadow-inner"
             [routerLinkActiveOptions]="{exact: false}"
             class="flex items-center px-3 py-2 rounded-lg text-sky-100 font-medium hover:bg-sky-600 hover:text-white transition-colors whitespace-nowrap text-sm">
            <lucide-icon [img]="item.icon" class="mr-1.5" size="16"></lucide-icon>
            {{ item.label }}
          </a>
        </nav>
      </div>

      <!-- Right Side: Search & Actions -->
      <div class="flex items-center space-x-4 ml-4">
        <!-- Search -->
        <div class="hidden xl:flex items-center w-64">
          <div class="relative w-full">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
              <lucide-icon [img]="Search" class="text-sky-300" size="16"></lucide-icon>
            </div>
            <input type="text" 
                   class="bg-sky-800 border border-sky-600 text-white placeholder-sky-300 text-sm rounded-full focus:ring-white focus:border-white block w-full pl-9 py-1.5 transition-colors" 
                   placeholder="Search...">
          </div>
        </div>

        <!-- Right Actions -->
        <div class="flex items-center space-x-3 sm:space-x-4 border-l border-sky-600 pl-4">
          <button class="relative text-sky-100 hover:text-white transition-colors">
            <lucide-icon [img]="Bell" size="20"></lucide-icon>
            <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border-2 border-sky-700"></span>
          </button>
          
          <div class="flex items-center space-x-2 cursor-pointer hover:bg-sky-600 p-1 rounded-lg transition-colors">
            <div class="w-8 h-8 rounded-full bg-sky-100 flex items-center justify-center text-sky-700">
              <lucide-icon [img]="User" size="18"></lucide-icon>
            </div>
            <div class="hidden xl:block text-left mr-2">
              <div class="text-sm font-semibold text-white leading-none">Admin</div>
            </div>
          </div>

          <button routerLink="/login" class="text-sky-200 hover:text-white transition-colors hidden sm:block ml-1" title="Logout">
            <lucide-icon [img]="LogOut" size="18"></lucide-icon>
          </button>
        </div>
      </div>

    </div>
  </div>
</header>
