<aside class="flex flex-col w-64 h-screen bg-white border-r border-slate-200">
  <!-- Logo Area -->
  <div class="flex items-center h-16 px-6 border-b border-slate-200">
    <lucide-icon [img]="TestTubes" class="text-blue-600 mr-3" size="24"></lucide-icon>
    <span class="text-xl font-bold text-slate-800 tracking-tight">LabMaster</span>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
    <a *ngFor="let item of navItems" 
       [routerLink]="item.route" 
       routerLinkActive="bg-blue-50 text-blue-600"
       [routerLinkActiveOptions]="{exact: false}"
       class="flex items-center px-3 py-2.5 rounded-lg text-slate-600 font-medium hover:bg-slate-50 hover:text-slate-900 transition-colors">
      <lucide-icon [img]="item.icon" class="mr-3" size="20"></lucide-icon>
      {{ item.label }}
    </a>
  </nav>

  <!-- Logout Area -->
  <div class="p-4 border-t border-slate-200">
    <button routerLink="/login" class="flex items-center w-full px-3 py-2.5 rounded-lg text-slate-600 font-medium hover:bg-red-50 hover:text-red-600 transition-colors">
      <lucide-icon [img]="LogOut" class="mr-3" size="20"></lucide-icon>
      Logout
    </button>
  </div>
</aside>
