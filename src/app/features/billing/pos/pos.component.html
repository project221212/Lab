<div class="space-y-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Billing & POS</h1>
      <p class="text-sm text-slate-500 mt-1">Generate invoice and collect payments for tests.</p>
    </div>
    <div class="flex space-x-3">
      <button class="inline-flex items-center justify-center px-4 py-2 border border-slate-300 shadow-sm text-sm font-medium rounded-lg text-slate-700 bg-white hover:bg-slate-50 transition-colors">
        <lucide-icon [img]="FileCheck" class="mr-2" size="16"></lucide-icon>
        Drafts
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    <!-- Left Column: Patient & Tests Selection -->
    <div class="lg:col-span-2 space-y-6">
      
      <!-- Select Patient -->
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
        <h2 class="text-sm font-bold text-slate-900 mb-4 flex items-center">
          <span class="w-6 h-6 rounded-full bg-sky-100 text-sky-800 flex items-center justify-center mr-2 text-xs">1</span> 
          Patient Details
        </h2>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
            <lucide-icon [img]="Search" class="text-slate-400" size="18"></lucide-icon>
          </div>
          <input type="text" value="PT-1042 - Rahul Sharma (+91 9876543210)" class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-lg focus:ring-sky-600 focus:border-sky-600 block w-full pl-10 p-2.5 font-medium" placeholder="Search patient by ID, Name or Mobile...">
        </div>
      </div>

      <!-- Add Tests -->
      <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-5">
        <h2 class="text-sm font-bold text-slate-900 mb-4 flex items-center">
          <span class="w-6 h-6 rounded-full bg-sky-100 text-sky-800 flex items-center justify-center mr-2 text-xs">2</span> 
          Add Tests
        </h2>
        <div class="flex space-x-2 mb-6">
          <div class="relative flex-1">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
              <lucide-icon [img]="Search" class="text-slate-400" size="18"></lucide-icon>
            </div>
            <input type="text" class="bg-white border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-sky-600 focus:border-sky-600 block w-full pl-10 p-2.5" placeholder="Search test name or code...">
          </div>
          <button class="px-4 py-2.5 bg-sky-50 text-sky-800 font-medium rounded-lg text-sm hover:bg-sky-100 transition-colors border border-sky-200">
            Add
          </button>
        </div>

        <!-- Selected Tests Table -->
        <div class="border border-slate-200 rounded-lg overflow-hidden">
          <table class="min-w-full divide-y divide-slate-200">
            <thead class="bg-slate-50">
              <tr>
                <th scope="col" class="px-4 py-3 text-left text-xs font-semibold text-slate-500 uppercase">Test Name</th>
                <th scope="col" class="px-4 py-3 text-right text-xs font-semibold text-slate-500 uppercase">Price (₹)</th>
                <th scope="col" class="px-4 py-3 text-center text-xs font-semibold text-slate-500 uppercase w-16">Action</th>
              </tr>
            </thead>
            <tbody class="bg-white divide-y divide-slate-200">
              <tr *ngFor="let item of billItems">
                <td class="px-4 py-3">
                  <div class="text-sm font-medium text-slate-900">{{ item.name }}</div>
                  <div class="text-xs text-slate-500">{{ item.id }}</div>
                </td>
                <td class="px-4 py-3 text-right text-sm font-medium text-slate-900">
                  {{ item.price }}
                </td>
                <td class="px-4 py-3 text-center">
                  <button class="text-slate-400 hover:text-red-600 transition-colors">
                    <lucide-icon [img]="Trash2" size="16"></lucide-icon>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
          
          <div *ngIf="billItems.length === 0" class="p-8 text-center text-slate-500">
            <p class="text-sm">No tests added yet.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Column: Invoice Summary -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm h-fit sticky top-6">
      <div class="p-5 border-b border-slate-200">
        <h2 class="text-lg font-bold text-slate-900 flex items-center">
          <lucide-icon [img]="IndianRupee" class="text-teal-600 mr-2" size="20"></lucide-icon>
          Bill Summary
        </h2>
      </div>
      
      <div class="p-5 space-y-4">
        <!-- Calculations -->
        <div class="space-y-3 pb-4 border-b border-slate-200 text-sm">
          <div class="flex justify-between items-center">
            <span class="text-slate-500">Subtotal</span>
            <span class="font-medium text-slate-900">₹{{ subtotal }}</span>
          </div>
          <div class="flex justify-between items-center">
            <span class="text-slate-500">Discount (₹)</span>
            <input type="number" [value]="discount" class="w-24 text-right border border-slate-300 rounded p-1 text-sm focus:ring-sky-600 focus:border-sky-600">
          </div>
          <div class="flex justify-between items-center">
            <span class="text-slate-500">GST (18%)</span>
            <span class="font-medium text-slate-900">₹{{ gst }}</span>
          </div>
        </div>

        <div class="flex justify-between items-center pt-2">
          <span class="text-base font-bold text-slate-900">Net Payable</span>
          <span class="text-2xl font-bold text-teal-600">₹{{ total }}</span>
        </div>

        <!-- Payment Mode -->
        <div class="pt-4 space-y-2">
          <label class="block text-xs font-medium text-slate-700">Payment Mode</label>
          <div class="grid grid-cols-2 gap-2">
            <label class="border border-sky-600 bg-sky-50 flex items-center justify-center p-2 rounded-lg cursor-pointer">
              <input type="radio" name="paymentMode" value="cash" checked class="hidden">
              <span class="text-sm font-medium text-sky-800">Cash</span>
            </label>
            <label class="border border-slate-200 flex items-center justify-center p-2 rounded-lg cursor-pointer hover:bg-slate-50">
              <input type="radio" name="paymentMode" value="card" class="hidden">
              <span class="text-sm font-medium text-slate-600">Card / UPI</span>
            </label>
          </div>
        </div>

        <!-- Actions -->
        <div class="pt-6 space-y-3">
          <button class="w-full flex items-center justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-bold text-white bg-teal-600 hover:bg-teal-700 transition-colors">
            <lucide-icon [img]="IndianRupee" class="mr-2" size="16"></lucide-icon>
            Complete Payment
          </button>
          <button class="w-full flex items-center justify-center py-2.5 px-4 border border-slate-300 rounded-lg shadow-sm text-sm font-medium text-slate-700 bg-white hover:bg-slate-50 transition-colors">
            <lucide-icon [img]="Printer" class="mr-2" size="16"></lucide-icon>
            Print Estimate
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
