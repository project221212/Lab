<div class="min-h-screen bg-slate-50 flex">
  <!-- Left Side: Form -->
  <div class="flex-1 flex flex-col justify-center py-12 px-4 sm:px-6 lg:flex-none lg:px-20 xl:px-24">
    <div class="mx-auto w-full max-w-sm lg:w-96">
      <div>
        <h2 class="mt-6 text-3xl font-extrabold text-slate-900">LabMaster UI</h2>
        <p class="mt-2 text-sm text-slate-600">
          Sign in to access the Diagnostic Lab Portal
        </p>
      </div>

      <div class="mt-8">
        <div class="mt-6">
          <form (ngSubmit)="onSubmit()" class="space-y-6">
            <div>
              <label for="username" class="block text-sm font-medium text-slate-700"> Username </label>
              <div class="mt-1">
                <input id="username" name="username" type="text" autocomplete="username" required
                       [(ngModel)]="userId"
                       class="appearance-none block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-sky-600 focus:border-sky-600 sm:text-sm">
              </div>
            </div>

            <div>
              <label for="password" class="block text-sm font-medium text-slate-700"> Password </label>
              <div class="mt-1">
                <input id="password" name="password" type="password" autocomplete="current-password" required
                       [(ngModel)]="password"
                       class="appearance-none block w-full px-3 py-2 border border-slate-300 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-sky-600 focus:border-sky-600 sm:text-sm">
              </div>
            </div>

            <div *ngIf="errorMsg" class="text-red-600 text-sm text-center">{{ errorMsg }}</div>

            <div class="flex items-center justify-between">
              <div class="flex items-center">
                <input id="remember-me" name="remember-me" type="checkbox" 
                       class="h-4 w-4 text-sky-700 focus:ring-sky-600 border-slate-300 rounded">
                <label for="remember-me" class="ml-2 block text-sm text-slate-900"> Remember me </label>
              </div>

              <div class="text-sm">
                <a href="#" class="font-medium text-sky-700 hover:text-blue-500"> Forgot your password? </a>
              </div>
            </div>

            <div>
              <button type="submit" [disabled]="loading"
                      class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-sky-700 hover:bg-sky-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-600 transition-colors disabled:opacity-60">
                {{ loading ? 'Signing in...' : 'Sign in' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Right Side: Image/Branding -->
  <div class="hidden lg:block relative w-0 flex-1 bg-sky-900">
    <div class="absolute inset-0 h-full w-full bg-gradient-to-br from-sky-700 to-sky-900 opacity-90"></div>
    <div class="absolute inset-0 flex items-center justify-center p-12">
      <div class="max-w-md text-white text-center">
        <h1 class="text-4xl font-bold mb-6">Premium Diagnostics Management</h1>
        <p class="text-lg text-sky-100">Enterprise-grade laboratory information system for modern healthcare facilities. Manage patients, tests, billing, and reporting in one seamless platform.</p>
      </div>
    </div>
  </div>
</div>
