<div class="space-y-6">
  <!-- Header & Actions -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900 tracking-tight">Test Master</h1>
      <p class="text-sm text-slate-500 mt-1">Configure laboratory tests, pricing, and normal ranges.</p>
    </div>
    <div class="flex space-x-3">
      <button class="inline-flex items-center justify-center px-4 py-2.5 border border-slate-300 shadow-sm text-sm font-medium rounded-lg text-slate-700 bg-white hover:bg-slate-50 focus:outline-none transition-colors">
        <lucide-icon [img]="Filter" class="mr-2" size="16"></lucide-icon>
        Filter
      </button>
      <button class="inline-flex items-center justify-center px-4 py-2.5 border border-transparent shadow-sm text-sm font-medium rounded-lg text-white bg-purple-600 hover:bg-purple-700 focus:outline-none transition-colors">
        <lucide-icon [img]="Plus" class="mr-2" size="16"></lucide-icon>
        Add New Test
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
    <!-- Main Table Area -->
    <div class="lg:col-span-3 bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <div class="p-4 border-b border-slate-200 flex items-center">
        <div class="relative flex-1 max-w-md">
          <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
            <lucide-icon [img]="Search" class="text-slate-400" size="18"></lucide-icon>
          </div>
          <input type="text" class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 block w-full pl-10 p-2.5" placeholder="Search by test name, code or category...">
        </div>
      </div>
      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-slate-200">
          <thead class="bg-slate-50">
            <tr>
              <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Test Details</th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Category & Dept</th>
              <th scope="col" class="px-6 py-4 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Price</th>
              <th scope="col" class="px-6 py-4 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-slate-200">
            <tr *ngFor="let test of tests" class="hover:bg-slate-50 transition-colors">
              <td class="px-6 py-4">
                <div class="text-sm font-bold text-slate-900">{{ test.name }}</div>
                <div class="text-xs text-slate-500 mt-0.5">Code: {{ test.id }}</div>
                <div class="text-xs text-slate-400 mt-1 truncate max-w-[200px]" title="{{ test.range }}">Ref: {{ test.range }}</div>
              </td>
              <td class="px-6 py-4 whitespace-nowrap">
                <div class="text-sm text-slate-900 font-medium">{{ test.category }}</div>
                <div class="text-xs text-slate-500 mt-0.5">{{ test.department }}</div>
              </td>
              <td class="px-6 py-4 whitespace-nowrap">
                <span class="inline-flex items-center px-2.5 py-1 text-sm font-semibold rounded-md bg-emerald-50 text-emerald-700">
                  ₹{{ test.price }}
                </span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                <div class="flex items-center justify-end space-x-2">
                  <button class="text-slate-400 hover:text-blue-600 transition-colors p-1" title="Edit">
                    <lucide-icon [img]="Edit" size="18"></lucide-icon>
                  </button>
                  <button class="text-slate-400 hover:text-red-600 transition-colors p-1" title="Delete">
                    <lucide-icon [img]="Trash2" size="18"></lucide-icon>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Add/Edit Form Sidebar Area -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm h-fit">
      <div class="p-4 border-b border-slate-200 bg-slate-50">
        <h2 class="text-base font-bold text-slate-900">Add Test Item</h2>
      </div>
      <div class="p-5 space-y-4">
        <div>
          <label class="block text-xs font-medium text-slate-700 mb-1">Test Code</label>
          <input type="text" value="TST-006" disabled class="w-full bg-slate-100 border border-slate-200 text-slate-600 text-sm rounded-lg p-2">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-700 mb-1">Test Name <span class="text-red-500">*</span></label>
          <input type="text" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 p-2">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-700 mb-1">Category <span class="text-red-500">*</span></label>
          <select class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 p-2">
            <option>Hematology</option>
            <option>Biochemistry</option>
            <option>Hormones</option>
            <option>Microbiology</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-700 mb-1">Department</label>
          <select class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 p-2">
            <option>Pathology</option>
            <option>Endocrinology</option>
            <option>Radiology</option>
          </select>
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-700 mb-1">Price (₹) <span class="text-red-500">*</span></label>
          <input type="number" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 p-2">
        </div>
        <div>
          <label class="block text-xs font-medium text-slate-700 mb-1">Normal Range</label>
          <textarea rows="2" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-lg focus:ring-purple-500 focus:border-purple-500 p-2"></textarea>
        </div>
        <div class="pt-2">
          <button class="w-full py-2 bg-purple-600 hover:bg-purple-700 text-white font-medium rounded-lg text-sm transition-colors shadow-sm">
            Save Test Item
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
